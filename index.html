<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Entry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --surface2: #f0f0f0;
            --border: #dddddd;
            --border-bright: #cccccc;
            --accent: #0078D4;
            --accent-dim: #e3f0fb;
            --accent2: #005a9e;
            --accent2-dim: #d0e4f5;
            --warn: #d97706;
            --warn-dim: #fef3c7;
            --danger: #f44336;
            --danger-dim: #fde8e8;
            --text: #333333;
            --text-muted: #666666;
            --text-dim: #999999;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
            --radius: 6px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0;
        }

        /* ── Top bar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .topbar-inner {
            max-width: 780px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .topbar-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-title {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .staff-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .staff-label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .staff-input-wrap {
            position: relative;
        }

        input.staff-field {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            padding: 7px 12px;
            border-radius: var(--radius);
            width: 140px;
            outline: none;
            transition: border-color 0.15s;
        }

        input.staff-field:focus {
            border-color: var(--accent2);
        }

        /* Staff dropdown */
        .staff-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            background: var(--surface2);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius);
            min-width: 200px;
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: none;
        }

        .staff-dropdown.open { display: block; }

        .staff-dropdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 14px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 12px;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        .staff-dropdown-item:last-child { border-bottom: none; }
        .staff-dropdown-item:hover { background: var(--surface); }
        .staff-dropdown-item .staff-num { color: var(--accent2); font-weight: 600; }
        .staff-dropdown-item .staff-cnt { color: var(--text-muted); font-size: 11px; }

        /* ── Entry panel ── */
        .entry-panel {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
        }

        .entry-fields {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 8px;
            align-items: end;
        }

        .entry-fields-below {
            margin-top: 4px;
            min-height: 14px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input.entry-field {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 500;
            padding: 10px 12px;
            border-radius: var(--radius);
            outline: none;
            width: 100%;
            transition: border-color 0.15s, background 0.15s;
        }

        input.entry-field:focus {
            border-color: var(--accent);
            background: #ffffff;
        }

        input.entry-field::placeholder { color: var(--text-dim); }

        input.entry-field.validated { border-color: var(--accent); }
        input.entry-field.error { border-color: var(--danger); }
        input.entry-field.warning { border-color: var(--warn); }
        input.entry-field.fjern {
            border-color: var(--danger);
            background: var(--danger-dim);
            color: var(--danger);
            font-weight: 700;
        }

        /* Product preview strip */
        .product-preview {
            margin-top: 10px;
            min-height: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-sku {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--accent2);
            background: var(--accent2-dim);
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .preview-title {
            font-size: 13px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 320px;
        }

        .preview-price {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
            white-space: nowrap;
        }

        .preview-status {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        .preview-status.loading { color: var(--accent2); }
        .preview-status.not-found { color: var(--warn); }
        .preview-status.error-state { color: var(--danger); }
        .preview-status.blocked { color: var(--danger); }

        /* Shelf validation message */
        .shelf-status {
            font-family: var(--mono);
            font-size: 10px;
            height: 14px;
            transition: color 0.15s;
        }

        .shelf-status.ok { color: var(--accent); }
        .shelf-status.blocked { color: var(--danger); }
        .shelf-status.checking { color: var(--text-muted); }

        /* Add button */
        .add-btn {
            background: var(--accent);
            color: #0e0f11;
            border: none;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            padding: 10px 18px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            white-space: nowrap;
            align-self: end;
        }

        .add-btn:hover { background: #5fffb0; }
        .add-btn:active { transform: scale(0.97); }
        .add-btn:disabled {
            background: var(--border);
            color: var(--text-dim);
            cursor: not-allowed;
        }

        /* ── Main content area ── */
        .main {
            max-width: 780px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ── Action bar ── */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .entry-count {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        .entry-count span {
            color: var(--text);
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 7px 14px;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-primary {
            background: var(--accent2);
            color: white;
        }

        .btn-primary:hover { background: #6eaeff; }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger-dim);
        }

        .btn-danger:hover { background: var(--danger-dim); }

        /* ── Entry stack ── */
        .entry-stack {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stack-empty {
            text-align: center;
            padding: 48px 20px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }

        .stack-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.25s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        .stack-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 1;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-index {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            width: 22px;
            text-align: right;
        }

        .item-body {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .item-top {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-sku {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--accent2);
            background: var(--accent2-dim);
            padding: 2px 7px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .item-shelf {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 2px 7px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .item-shelf.remove {
            color: var(--danger);
            background: var(--danger-dim);
        }

        .item-title {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-title.loading {
            color: var(--text-dim);
            font-style: italic;
        }

        .item-price {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .item-remove {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }

        .item-remove:hover {
            color: var(--danger);
            background: var(--danger-dim);
        }

        /* ── Receipt ── */
        .receipt {
            margin-top: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: none;
        }

        .receipt.visible { display: block; }

        .receipt-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .receipt-title {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        .receipt-title strong {
            color: var(--accent);
            font-weight: 600;
        }

        .receipt-actions {
            display: flex;
            gap: 6px;
        }

        .receipt-btn {
            padding: 5px 11px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .rcopy { background: var(--accent2); color: white; }
        .rcopy:hover { background: #6eaeff; }
        .rrestore { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
        .rrestore:hover { background: var(--surface2); }

        .receipt-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: 11px;
        }

        .receipt-table th {
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 8px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .receipt-table td {
            padding: 7px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        .receipt-table tr:last-child td { border-bottom: none; }
        .receipt-table tr:nth-child(even) td { background: #f8f8f8; }
        .receipt-table td:first-child { color: var(--accent2); }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface2);
            border: 1px solid var(--border-bright);
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            padding: 10px 18px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 300;
            white-space: nowrap;
        }

        .toast.success { border-color: var(--accent); color: var(--accent); }
        .toast.error { border-color: var(--danger); color: var(--danger); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background: var(--surface2);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius);
            padding: 24px 28px;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.6);
        }

        .modal h3 {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .modal p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .modal input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 600;
            padding: 10px 12px;
            border-radius: var(--radius);
            outline: none;
            margin-bottom: 16px;
        }

        .modal input:focus { border-color: var(--accent2); }

        .modal-btns {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 12px;
            cursor: pointer;
        }

        .modal-cancel:hover { background: var(--surface); }

        .modal-confirm {
            background: var(--accent2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-confirm:hover { background: #6eaeff; }

        .version {
            position: fixed;
            bottom: 8px;
            right: 12px;
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<!-- ── Sticky entry panel ── -->
<div class="topbar">
    <div class="topbar-inner">
        <div class="topbar-head">
            <span class="app-title">Inventory Entry</span>
            <div class="staff-row">
                <span class="staff-label">Staff #</span>
                <div class="staff-input-wrap">
                    <input type="text" id="staffNumber" class="staff-field" placeholder="—" autocomplete="off">
                    <div id="staffDropdown" class="staff-dropdown"></div>
                </div>
            </div>
        </div>

        <div class="entry-panel">
            <div class="entry-fields">
                <div class="field-group">
                    <span class="field-label">SKU</span>
                    <input type="text" id="skuInput" class="entry-field" placeholder="e.g. 10234" autocomplete="off">
                </div>
                <div class="field-group">
                    <span class="field-label">Shelf</span>
                    <input type="text" id="shelfInput" class="entry-field" placeholder="e.g. A0101" autocomplete="off">
                </div>
                <button id="addBtn" class="add-btn" onclick="addEntry()">Add ↵</button>
            </div>
            <div class="entry-fields-below">
                <span id="shelfStatus" class="shelf-status"></span>
            </div>
            <div class="product-preview" id="productPreview">
                <span class="preview-status" id="previewStatus"></span>
            </div>
        </div>
    </div>
</div>

<!-- ── Main content ── -->
<div class="main">
    <div class="action-bar">
        <span class="entry-count" id="entryCount">No entries yet</span>
        <div class="action-buttons">
            <button class="btn btn-danger" onclick="clearAll()">Clear</button>
            <button class="btn btn-primary" onclick="submitEntries()">Copy to Clipboard</button>
        </div>
    </div>

    <div id="entryStack" class="entry-stack">
        <div class="stack-empty" id="emptyState">Enter a SKU and shelf above to begin</div>
    </div>

    <div id="receipt" class="receipt">
        <div class="receipt-head">
            <span class="receipt-title"><strong id="receiptCount">0</strong> rows copied</span>
            <div class="receipt-actions">
                <button class="receipt-btn rcopy" onclick="copyReceiptAgain()">Copy Again</button>
                <button class="receipt-btn rrestore" onclick="restoreData()">Restore</button>
            </div>
        </div>
        <table class="receipt-table">
            <thead>
                <tr>
                    <th>SKU</th><th>Shelf</th><th>Staff</th><th>Date</th>
                </tr>
            </thead>
            <tbody id="receiptBody"></tbody>
        </table>
    </div>
</div>

<!-- ── Staff modal ── -->
<div id="staffModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3>Staff Number Required</h3>
        <p>Enter your staff number to submit entries.</p>
        <input type="text" id="modalStaffInput" placeholder="Staff number">
        <div class="modal-btns">
            <button class="modal-cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-confirm" onclick="confirmModal()">Confirm</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<div class="version">v2.2.1</div>

<script>
// ─── State ───────────────────────────────────────────────
let currentStaffNumber = '';
let entries = []; // { id, sku, shelf, title, price, loading, crawledAt, queueStatus }
let lastSubmittedData = null;
let lastClipboardText = '';
let skuDebounceTimer = null;
let shelfDebounceTimer = null;
let productCache = {}; // sku -> product data with crawled_at timestamp
let entryIdCounter = 0;
const CRAWL_AGE_THRESHOLD_MS = 3600000; // 1 hour in milliseconds

// ─── LocalStorage helpers ─────────────────────────────────
function getAllStaffData() {
    try { return JSON.parse(localStorage.getItem('inventoryStaffData') || '{}'); }
    catch { return {}; }
}

function saveStaffData() {
    if (!currentStaffNumber) return;
    try {
        const all = getAllStaffData();
        all[currentStaffNumber] = entries.map(e => ({ sku: e.sku, shelf: e.shelf }));
        localStorage.setItem('inventoryStaffData', JSON.stringify(all));
    } catch {}
}

function removeStaffData(staffNumber) {
    try {
        const all = getAllStaffData();
        delete all[staffNumber];
        localStorage.setItem('inventoryStaffData', JSON.stringify(all));
    } catch {}
}

function loadStaffData(staffNumber) {
    entries = [];
    if (!staffNumber) { renderStack(); return; }
    try {
        const all = getAllStaffData();
        const rows = all[staffNumber] || [];
        rows.forEach(r => {
            const id = ++entryIdCounter;
            entries.unshift({ id, sku: r.sku, shelf: r.shelf, title: null, price: null, loading: true, crawledAt: null, queueStatus: null });
        });
        renderStack();
        // Fetch product info for loaded entries
        entries.forEach(e => fetchProductForEntry(e));
    } catch {}
}

// ─── API ──────────────────────────────────────────────────
const API_BASE = 'https://datahydrate.com';
const STALE_THRESHOLD_MS = 60 * 60 * 1000; // 1 hour in milliseconds

function isProductStale(product) {
    if (!product || !product.updated_at) return false;
    try {
        const updatedTime = new Date(product.updated_at).getTime();
        const age = Date.now() - updatedTime;
        return age > STALE_THRESHOLD_MS;
    } catch {
        return false;
    }
}

async function fetchProduct(sku, bypassCache = false) {
    if (!bypassCache && productCache[sku] !== undefined) {
        const cached = productCache[sku];
        // Check if cached data is stale based on updated_at from API
        if (cached && isProductStale(cached)) {
            // Data is stale; queue it for crawling in background
            queueStaleProduct(sku);
        }
        // Return cached data anyway (don't block UI)
        return cached;
    }
    try {
        const res = await fetch(`${API_BASE}/api/products?sku=${encodeURIComponent(sku)}`, {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
            mode: 'cors',
            cache: 'no-cache'
        });
        if (!res.ok) {
            console.warn(`[datahydrate] HTTP ${res.status} for SKU ${sku}`);
            productCache[sku] = null;
            return null;
        }
        const data = await res.json();
        console.log(`[datahydrate] SKU ${sku}:`, data);
        // API returns an array; grab first matching item
        const product = Array.isArray(data) && data.length > 0 ? data[0] : null;
        if (product && isProductStale(product)) {
            // Freshly fetched data is already stale; queue it
            queueStaleProduct(sku);
        }
        productCache[sku] = product;
        return product;
    } catch (err) {
        console.error(`[datahydrate] Fetch failed for SKU ${sku}:`, err);
        productCache[sku] = null;
        return null;
    }
}

let stalePollTimers = {}; // Track polling timers by SKU

async function queueStaleProduct(sku) {
    try {
        const res = await fetch(`${API_BASE}/api/queue?sku=${encodeURIComponent(sku)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            mode: 'cors'
        });
        if (res.ok) {
            const data = await res.json();
            console.log(`[datahydrate] SKU ${sku} queued for crawling:`, data);
            const estimatedMs = data.estimatedTimeMs;
            // Start polling for fresh data after estimated time + buffer
            if (estimatedMs !== null && estimatedMs !== undefined) {
                pollForFreshProduct(sku, estimatedMs);
            }
        } else {
            console.warn(`[datahydrate] Failed to queue SKU ${sku}: HTTP ${res.status}`);
        }
    } catch (err) {
        console.error(`[datahydrate] Queue request failed for SKU ${sku}:`, err);
    }
}

function pollForFreshProduct(sku, estimatedMs) {
    // Clear any existing timer for this SKU
    if (stalePollTimers[sku]) {
        clearTimeout(stalePollTimers[sku]);
    }

    // Wait for estimated time + 2 second buffer, then start polling
    const initialDelay = (estimatedMs || 5000) + 2000;
    const pollInterval = 3000; // Poll every 3 seconds
    const maxPollAttempts = 10; // Try for ~30 seconds total

    let pollAttempts = 0;

    const poll = async () => {
        pollAttempts++;
        console.log(`[datahydrate] Polling for fresh data: SKU ${sku} (attempt ${pollAttempts}/${maxPollAttempts})`);

        try {
            // Fetch with cache bypass to get latest data
            const freshProduct = await fetchProduct(sku, true);

            if (freshProduct && !isProductStale(freshProduct)) {
                // Data is now fresh! Update any visible entries
                console.log(`[datahydrate] SKU ${sku} is now fresh. Updating entries.`);
                updateEntriesWithFreshProduct(sku, freshProduct);
                delete stalePollTimers[sku];
                return;
            }

            // Still stale or not found, keep polling
            if (pollAttempts < maxPollAttempts) {
                stalePollTimers[sku] = setTimeout(poll, pollInterval);
            } else {
                console.log(`[datahydrate] Gave up polling SKU ${sku} after ${maxPollAttempts} attempts`);
                delete stalePollTimers[sku];
            }
        } catch (err) {
            console.error(`[datahydrate] Poll fetch failed for SKU ${sku}:`, err);
            if (pollAttempts < maxPollAttempts) {
                stalePollTimers[sku] = setTimeout(poll, pollInterval);
            } else {
                delete stalePollTimers[sku];
            }
        }
    };

    // Schedule first poll after initial delay
    stalePollTimers[sku] = setTimeout(poll, initialDelay);
}

function updateEntriesWithFreshProduct(sku, freshProduct) {
    // Update all entries with this SKU
    entries.forEach(entry => {
        if (entry.sku === sku) {
            entry.title = freshProduct.title || null;
            entry.price = freshProduct.price_cents != null ? freshProduct.price_cents : null;
            entry.isPublic = freshProduct.is_public;
            // Mark as no longer loading to trigger re-render
            entry.loading = false;
        }
    });
    renderStack();
}

// Check if product data is stale and queue for crawling if needed
async function queueIfStale(product, sku) {
    if (!product || !product.crawled_at) return;
    
    const crawledTime = new Date(product.crawled_at).getTime();
    const now = Date.now();
    const ageMs = now - crawledTime;
    
    if (ageMs > CRAWL_AGE_THRESHOLD_MS) {
        console.log(`[datahydrate] SKU ${sku} is ${Math.round(ageMs / 1000 / 60)} minutes old, queuing for crawl`);
        try {
            const res = await fetch(`${API_BASE}/api/queue?sku=${encodeURIComponent(sku)}`, {
                method: 'POST',
                headers: { 'Accept': 'application/json' },
                mode: 'cors'
            });
            if (res.ok) {
                const queueData = await res.json();
                console.log(`[datahydrate] SKU ${sku} queued. Position: ${queueData.queuePosition}, ETA: ${queueData.estimatedTimeMs}ms`);
                return queueData;
            } else {
                console.warn(`[datahydrate] Queue failed for SKU ${sku}: HTTP ${res.status}`);
            }
        } catch (err) {
            console.error(`[datahydrate] Queue request failed for SKU ${sku}:`, err);
        }
    }
}

async function fetchProductForEntry(entry) {
    if (!entry.sku) return;
    const product = await fetchProduct(entry.sku);
    entry.loading = false;
    if (product) {
        entry.title = product.title || null;
        entry.price = product.price_cents != null ? product.price_cents : null;
        entry.isPublic = product.is_public;
        entry.crawledAt = product.crawled_at || null;
        
        // Queue for crawling if stale
        queueIfStale(product, entry.sku);
    }
    renderStack();
}

// Shelf whitelist check — respects is_public field.
// When whitelist is active, only shelves matching is_public=true products
// are allowed. Currently we use a simulated check; when the API
// supports shelf whitelisting natively this can be swapped out.
async function checkShelfAllowed(shelf) {
    if (!shelf) return { allowed: true };
    // Future: hit a dedicated shelf/whitelist endpoint when available.
    // For now: any non-empty shelf is allowed. The is_public check on the
    // product side is enforced separately when the product is fetched.
    return { allowed: true };
}

// ─── SKU preview in entry bar ─────────────────────────────
function setPreview(html) {
    const el = document.getElementById('productPreview');
    if (el) el.innerHTML = html;
}

function handleSkuInput() {
    clearTimeout(skuDebounceTimer);
    const sku = document.getElementById('skuInput').value.trim().toUpperCase();
    document.getElementById('skuInput').value = sku;

    if (!sku) {
        setPreview('<span class="preview-status" id="previewStatus"></span>');
        return;
    }

    setPreview('<span class="preview-status loading" id="previewStatus">looking up…</span>');

    skuDebounceTimer = setTimeout(async () => {
        const currentSku = document.getElementById('skuInput')?.value.trim().toUpperCase();
        if (currentSku !== sku) return;

        let product = null;
        try {
            product = await fetchProduct(sku, true);
        } catch {}

        const skuAfter = document.getElementById('skuInput')?.value.trim().toUpperCase();
        if (skuAfter !== sku) return;

        if (product) {
            const title = product.title || '—';
            const price = product.price_cents != null
                ? `kr ${(product.price_cents / 100).toFixed(2)}`
                : '';
            const isPublic = product.is_public;
            setPreview(`
                <span class="preview-sku">${sku}</span>
                <span class="preview-title" title="${title}">${title}</span>
                ${price ? `<span class="preview-price">${price}</span>` : ''}
                ${!isPublic ? `<span class="preview-status blocked" style="margin-left:6px">⊘ not public</span>` : ''}
            `);
        } else {
            setPreview(`
                <span class="preview-sku">${sku}</span>
                <span class="preview-status not-found">Product not found</span>
            `);
        }
    }, 350);
}

// ─── Shelf validation ────────────────────────────────────
function handleShelfInput() {
    clearTimeout(shelfDebounceTimer);

    const shelfUppercase = document.getElementById('shelfInput').value.toUpperCase();
    document.getElementById('shelfInput').value = shelfUppercase;

    const shelf = document.getElementById('shelfInput').value.trim().toUpperCase();
    const statusEl = document.getElementById('shelfStatus');
    const shelfField = document.getElementById('shelfInput');

    if (!shelf) {
        statusEl.textContent = '';
        shelfField.className = 'entry-field';
        return;
    }

    // Sync fjern styling
    if (shelf === '*FJERN*') {
        shelfField.classList.add('fjern');
    } else {
        shelfField.classList.remove('fjern');
    }

    statusEl.textContent = 'checking…';
    statusEl.className = 'shelf-status checking';

    shelfDebounceTimer = setTimeout(async () => {
        let result = { allowed: true };
        try { result = await checkShelfAllowed(shelf); } catch {}

        // Bail if field changed since debounce fired
        const currentShelf = document.getElementById('shelfInput')?.value.trim().toUpperCase();
        if (currentShelf !== shelf) return;

        const sEl = document.getElementById('shelfStatus');
        const sField = document.getElementById('shelfInput');
        if (!sEl || !sField) return;

        if (result.allowed) {
            sEl.textContent = '✓ allowed';
            sEl.className = 'shelf-status ok';
            sField.classList.remove('error', 'warning');
            sField.classList.add('validated');
        } else {
            sEl.textContent = '⊘ shelf blocked';
            sEl.className = 'shelf-status blocked';
            sField.classList.remove('validated', 'warning');
            sField.classList.add('error');
        }
    }, 300);
}

// ─── Add entry ────────────────────────────────────────────
async function addEntry() {
    const skuRaw = document.getElementById('skuInput').value.trim().toUpperCase();
    const shelfRaw = document.getElementById('shelfInput').value.trim().toUpperCase() || getLastShelf();

    if (!skuRaw) { showToast('Enter a SKU', 'error'); document.getElementById('skuInput').focus(); return; }
    if (!shelfRaw) { showToast('Enter a shelf', 'error'); document.getElementById('shelfInput').focus(); return; }

    // Check shelf whitelist before adding
    const shelfCheck = await checkShelfAllowed(shelfRaw);
    if (!shelfCheck.allowed) {
        showToast(`Shelf "${shelfRaw}" is not whitelisted`, 'error');
        document.getElementById('shelfInput').focus();
        return;
    }

    const shelf = shelfRaw === ' ' ? '*FJERN*' : shelfRaw;

    const id = ++entryIdCounter;
    const entry = { id, sku: skuRaw, shelf, title: null, price: null, loading: true, isPublic: true, crawledAt: null, queueStatus: null };
    entries.unshift(entry);

    // Copy cached product info immediately if available
    if (productCache[skuRaw] !== undefined && productCache[skuRaw] !== null) {
        const p = productCache[skuRaw];
        entry.loading = false;
        entry.title = p.title || null;
        entry.price = p.price_cents != null ? p.price_cents : null;
        entry.isPublic = p.is_public;
        entry.crawledAt = p.crawled_at || null;
        
        // Queue for crawling if stale
        queueIfStale(p, skuRaw);
    }

    renderStack();
    saveStaffData();

    // Clear inputs and reset preview
    document.getElementById('skuInput').value = '';
    document.getElementById('shelfInput').value = '';
    document.getElementById('shelfInput').placeholder = 'e.g. A0101';
    document.getElementById('shelfInput').className = 'entry-field';
    document.getElementById('shelfStatus').textContent = '';
    document.getElementById('productPreview').innerHTML = '<span class="preview-status" id="previewStatus"></span>';

    document.getElementById('skuInput').focus();

    // Async fetch if not cached
    if (entry.loading) {
        fetchProductForEntry(entry);
    }
}

function getLastShelf() {
    for (const e of entries) {
        if (e.shelf) return e.shelf;
    }
    return '';
}

function removeEntry(id) {
    entries = entries.filter(e => e.id !== id);
    renderStack();
    saveStaffData();
}

// ─── Render stack ─────────────────────────────────────────
function renderStack() {
    const stack = document.getElementById('entryStack');
    const empty = document.getElementById('emptyState');

    updateEntryCount();

    if (entries.length === 0) {
        stack.innerHTML = '<div class="stack-empty" id="emptyState">Enter a SKU and shelf above to begin</div>';
        return;
    }

    // Keep existing DOM nodes to avoid reflowing animated items;
    // we rebuild fully here for simplicity (entries rarely > 100)
    const existingIds = new Set(
        Array.from(stack.querySelectorAll('.stack-item')).map(el => el.dataset.id)
    );

    // Remove items no longer in entries
    stack.querySelectorAll('.stack-item').forEach(el => {
        if (!entries.find(e => String(e.id) === el.dataset.id)) el.remove();
    });

    // Add/update entries — insert at correct position
    entries.forEach((entry, idx) => {
        let el = stack.querySelector(`.stack-item[data-id="${entry.id}"]`);
        const isNew = !el;

        if (isNew) {
            el = document.createElement('div');
            el.className = 'stack-item';
            el.dataset.id = entry.id;
        }

        const shelfClass = entry.shelf === '*FJERN*' ? 'item-shelf remove' : 'item-shelf';
        const titleHtml = entry.loading
            ? `<span class="item-title loading">loading…</span>`
            : entry.title
                ? `<span class="item-title" title="${entry.title}">${entry.title}</span>`
                : `<span class="item-title" style="color:var(--text-dim)">Unknown product</span>`;

        const priceHtml = !entry.loading && entry.price != null
            ? `<span class="item-price">kr ${(entry.price / 100).toFixed(2)}</span>`
            : '';

        el.innerHTML = `
            <span class="item-index">${String(entries.length - idx).padStart(2, '0')}</span>
            <div class="item-body">
                <div class="item-top">
                    <span class="item-sku">${entry.sku}</span>
                    <span class="${shelfClass}">${entry.shelf}</span>
                </div>
                ${titleHtml}
            </div>
            ${priceHtml}
            <button class="item-remove" title="Remove" onclick="removeEntry(${entry.id})">×</button>
        `;

        if (isNew) {
            if (stack.firstChild) stack.insertBefore(el, stack.firstChild);
            else stack.appendChild(el);
        }
    });

    updateEntryCount();
}

function updateEntryCount() {
    const el = document.getElementById('entryCount');
    const n = entries.length;
    el.innerHTML = n === 0
        ? 'No entries yet'
        : `<span>${n}</span> entr${n === 1 ? 'y' : 'ies'}`;
}

// ─── Submit / clipboard ───────────────────────────────────
async function submitEntries() {
    const staff = document.getElementById('staffNumber').value.trim();
    if (!staff) { showModal(); return; }
    await performCopy(staff);
}

async function performCopy(staffNumber) {
    if (entries.length === 0) { showToast('No entries to copy', 'error'); return; }

    const today = new Date().toISOString().split('T')[0];
    const lines = [];
    const forReceipt = [];
    const forRestore = [];

    entries.forEach(e => {
        lines.push(`${e.sku}\t${e.shelf}\t${staffNumber}\t${today}`);
        forReceipt.push({ sku: e.sku, shelf: e.shelf });
        forRestore.push({ sku: e.sku, shelf: e.shelf });
    });

    const text = lines.join('\n');

    try {
        await navigator.clipboard.writeText(text);
        lastSubmittedData = { staffNumber, rows: forRestore };
        lastClipboardText = text;

        removeStaffData(staffNumber);
        entries = [];
        renderStack();
        displayStaffDropdown();

        showReceipt(forReceipt, staffNumber, today);
        showToast(`${lines.length} rows copied!`, 'success');
    } catch {
        showToast('Clipboard failed. Try again.', 'error');
    }
}

async function copyReceiptAgain() {
    if (!lastClipboardText) { showToast('Nothing to copy', 'error'); return; }
    try {
        await navigator.clipboard.writeText(lastClipboardText);
        showToast('Copied again!', 'success');
    } catch {
        showToast('Clipboard failed', 'error');
    }
}

function restoreData() {
    if (!lastSubmittedData) { showToast('Nothing to restore', 'error'); return; }
    const { staffNumber, rows } = lastSubmittedData;

    try {
        const all = getAllStaffData();
        all[staffNumber] = rows;
        localStorage.setItem('inventoryStaffData', JSON.stringify(all));
    } catch { showToast('Restore failed', 'error'); return; }

    document.getElementById('staffNumber').value = staffNumber;
    currentStaffNumber = staffNumber;
    loadStaffData(staffNumber);

    document.getElementById('receipt').classList.remove('visible');
    lastSubmittedData = null;
    lastClipboardText = '';

    showToast('Data restored', 'success');
    displayStaffDropdown();
}

// ─── Receipt ─────────────────────────────────────────────
function showReceipt(rows, staff, date) {
    const tbody = document.getElementById('receiptBody');
    tbody.innerHTML = rows.map(r =>
        `<tr><td>${r.sku}</td><td>${r.shelf}</td><td>${staff}</td><td>${date}</td></tr>`
    ).join('');
    document.getElementById('receiptCount').textContent = rows.length;
    document.getElementById('receipt').classList.add('visible');
}

// ─── Clear ────────────────────────────────────────────────
function clearAll() {
    if (!confirm('Clear all entries for this session?')) return;
    entries = [];
    renderStack();
    if (currentStaffNumber) saveStaffData();
    document.getElementById('receipt').classList.remove('visible');
    showToast('Cleared', 'success');
}

// ─── Staff number / dropdown ──────────────────────────────
function handleStaffInput() {
    const val = document.getElementById('staffNumber').value.trim();
    if (currentStaffNumber && val !== currentStaffNumber) {
        saveStaffData();
        entries = [];
        currentStaffNumber = '';
        renderStack();
    }
    displayStaffDropdown();
}

function handleStaffChange() {
    const val = document.getElementById('staffNumber').value.trim();
    if (val === currentStaffNumber) return;

    const unowned = entries.map(e => ({ sku: e.sku, shelf: e.shelf }));

    saveStaffData();
    currentStaffNumber = val;

    if (val) {
        const all = getAllStaffData();
        const saved = all[val] || [];
        entries = [];

        saved.forEach(r => {
            const id = ++entryIdCounter;
            entries.unshift({ id, sku: r.sku, shelf: r.shelf, title: null, price: null, loading: true, crawledAt: null, queueStatus: null });
        });

        // Merge unowned rows
        unowned.forEach(r => {
            const id = ++entryIdCounter;
            entries.unshift({ id, sku: r.sku, shelf: r.shelf, title: null, price: null, loading: true, crawledAt: null, queueStatus: null });
        });

        renderStack();
        entries.forEach(e => { if (e.loading) fetchProductForEntry(e); });
        saveStaffData();

        if (saved.length > 0 && unowned.length > 0)
            showToast(`Merged ${unowned.length} new + ${saved.length} saved`, 'success');
        else if (unowned.length > 0)
            showToast(`${unowned.length} row${unowned.length>1?'s':''} assigned to #${val}`, 'success');
    } else {
        entries = unowned.map(r => ({ id: ++entryIdCounter, sku: r.sku, shelf: r.shelf, title: null, price: null, loading: true, crawledAt: null, queueStatus: null }));
        renderStack();
    }

    displayStaffDropdown();
}

function displayStaffDropdown() {
    const dd = document.getElementById('staffDropdown');
    const current = document.getElementById('staffNumber').value.trim();

    if (current) { dd.classList.remove('open'); return; }

    const all = getAllStaffData();
    const nums = Object.keys(all).filter(n => (all[n]||[]).length > 0);

    if (nums.length === 0) { dd.classList.remove('open'); return; }

    dd.innerHTML = nums.map(n => `
        <div class="staff-dropdown-item" onclick="selectStaff('${n}')">
            <span class="staff-num">#${n}</span>
            <span class="staff-cnt">${all[n].length} row${all[n].length!==1?'s':''}</span>
        </div>
    `).join('');
    dd.classList.add('open');
}

function selectStaff(num) {
    document.getElementById('staffNumber').value = num;
    document.getElementById('staffDropdown').classList.remove('open');
    handleStaffChange();
}

// ─── Modal ────────────────────────────────────────────────
function showModal() {
    const modal = document.getElementById('staffModal');
    const inp = document.getElementById('modalStaffInput');
    modal.classList.add('visible');
    inp.value = '';
    setTimeout(() => inp.focus(), 50);
}

function closeModal() {
    document.getElementById('staffModal').classList.remove('visible');
}

function confirmModal() {
    const val = document.getElementById('modalStaffInput').value.trim().toUpperCase();
    if (!val) { document.getElementById('modalStaffInput').focus(); return; }
    document.getElementById('staffNumber').value = val;
    handleStaffChange();
    closeModal();
    performCopy(val);
}

// ─── Toast ────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    clearTimeout(toastTimer);

}

// ─── Keyboard shortcuts ───────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); submitEntries(); }
    if (e.key === 'Escape') closeModal();
});

document.getElementById('modalStaffInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmModal();
    if (e.key === 'Escape') closeModal();
});

// Enter/Tab in SKU field → move to shelf
document.getElementById('skuInput').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === ' ') {
        e.preventDefault();
        document.getElementById('shelfInput').value = '*FJERN*';
        handleShelfInput();
        addEntry();
        return;
    }
    if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
        e.preventDefault();
        const shelf = document.getElementById('shelfInput');
        const lastShelf = getLastShelf();
        if (e.key === 'Enter' && !shelf.value.trim() && lastShelf) {
            // Accept inherited shelf
            shelf.value = lastShelf;
            handleShelfInput();
        }
        // Tab: leave shelf empty (discard inherited), just move focus
        shelf.focus(); shelf.select();
    }
});

document.getElementById('skuInput').addEventListener('focus', () => {
    const shelf = document.getElementById('shelfInput');
    const lastShelf = getLastShelf();
    if (!shelf.value.trim() && lastShelf) {
        shelf.placeholder = lastShelf;
    }
});

document.getElementById('skuInput').addEventListener('blur', () => {
    const shelf = document.getElementById('shelfInput');
    if (!shelf.value.trim()) {
        shelf.placeholder = 'e.g. A0101';
    }
});

// ─── Numpad shelf interceptor ─────────────────────────────
// Maps numpad digit 1-9 to shelf row letters (no I)
const NUMPAD_ROW_LETTER = { '1':'A','2':'B','3':'C','4':'D','5':'E','6':'F','7':'G','8':'H','9':'J' };
// Maps numpad digit 1-6 to T-shelf sub-letters
const NUMPAD_T_LETTER   = { '1':'A','2':'B','3':'C','4':'D','5':'E','6':'F' };

// Returns true if val is a completed shelf pattern (further input blocked)
function isShelfComplete(val) {
    if (val === '*FJERN*') return true;
    if (/^[A-HJ]\d{4}$/.test(val)) return true;   // standard: [A-HJ][0-9]{4}
    if (/^T\d{4}[A-F]$/.test(val)) return true;    // T-shelf:  T[0-9]{4}[A-F]
    return false;
}

// Returns true if val is T + exactly 4 digits — awaiting final letter
function isTShelfAwaitingLetter(val) {
    return /^T\d{4}$/.test(val);
}

// Enter/Tab in shelf field → submit if both fields have values, else move to SKU
document.getElementById('shelfInput').addEventListener('keydown', e => {
    const field = e.currentTarget;

    // ── Standard shortcuts ────────────────────────────────
    if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
        e.preventDefault();
        const sku = document.getElementById('skuInput').value.trim();
        const shelf = field.value.trim();
        if (sku && shelf) {
            addEntry();
        } else {
            document.getElementById('skuInput').focus();
        }
        return;
    }

    // Ctrl+Space in shelf field → *FJERN*
    if (e.ctrlKey && e.key === ' ') {
        e.preventDefault();
        field.value = '*FJERN*';
        field.className = 'entry-field fjern';
        field.select();
        handleShelfInput();
        return;
    }

    // ── Numpad handling ───────────────────────────────────
    const NUMPAD_DIGIT_MAP = {
        'Numpad0':'0','Numpad1':'1','Numpad2':'2','Numpad3':'3','Numpad4':'4',
        'Numpad5':'5','Numpad6':'6','Numpad7':'7','Numpad8':'8','Numpad9':'9'
    };
    const isNumpadDigit = NUMPAD_DIGIT_MAP.hasOwnProperty(e.code);
    const isNumpadAdd   = e.code === 'NumpadAdd';
    const isNumpadEnter = e.code === 'NumpadEnter';

    if (isNumpadEnter) {
        e.preventDefault();
        const sku = document.getElementById('skuInput').value.trim();
        const shelf = field.value.trim();
        if (sku && shelf) addEntry(); else document.getElementById('skuInput').focus();
        return;
    }

    if (!isNumpadDigit && !isNumpadAdd) return; // not our concern

    e.preventDefault(); // take full control of numpad input in this field

    const digit = isNumpadAdd ? null : NUMPAD_DIGIT_MAP[e.code];

    // If the entire field is selected (e.g. inherited shelf), treat it as empty
    // so the first numpad key replaces it immediately without needing Delete first
    if (field.selectionStart === 0 && field.selectionEnd === field.value.length && field.value.length > 0) {
        field.value = '';
        field.className = 'entry-field';
    }

    const currentVal = field.value;

    // Block if pattern already complete
    if (isShelfComplete(currentVal)) return;

    // ── Empty field ───────────────────────────────────────
    if (currentVal === '') {
        if (isNumpadAdd) {
            field.value = 'T';
        } else if (digit === '0') {
            field.value = '*FJERN*';
            field.className = 'entry-field fjern';
            field.select();
        } else {
            field.value = NUMPAD_ROW_LETTER[digit];
        }
        handleShelfInput();
        return;
    }

    // ── T-shelf awaiting final letter ─────────────────────
    if (isTShelfAwaitingLetter(currentVal)) {
        if (!isNumpadAdd && NUMPAD_T_LETTER[digit]) {
            field.value = currentVal + NUMPAD_T_LETTER[digit];
            field.className = 'entry-field validated';
        }
        // 7-9, +, 0 silently blocked in this state
        handleShelfInput();
        return;
    }

    // ── In-progress numeric portion ───────────────────────
    if (isNumpadAdd) return; // + not valid mid-pattern
    const digitCount = (currentVal.match(/\d/g) || []).length;
    if (digitCount < 4) {
        field.value = currentVal + digit;
        handleShelfInput();
    }
    // digitCount === 4 on standard pattern means complete — isShelfComplete blocks further input
});

// ─── Wire up inputs ────────────────────────────────────────
document.getElementById('skuInput').addEventListener('input', handleSkuInput);
document.getElementById('shelfInput').addEventListener('input', handleShelfInput);
document.getElementById('staffNumber').addEventListener('input', handleStaffInput);
document.getElementById('staffNumber').addEventListener('change', handleStaffChange);
document.getElementById('staffNumber').addEventListener('blur', () => {
    setTimeout(() => { handleStaffChange(); displayStaffDropdown(); }, 200);
});

// Close dropdown when clicking outside
document.addEventListener('click', e => {
    if (!e.target.closest('.staff-input-wrap'))
        document.getElementById('staffDropdown').classList.remove('open');
});

// ─── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    displayStaffDropdown();
    document.getElementById('skuInput').focus();
});
</script>
</body>
</html>
